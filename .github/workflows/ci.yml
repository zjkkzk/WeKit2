name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: . -> target

      - name: Cache Gradle build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      - name: Build native library
        run: |
          cargo xtask configure
          cargo xtask build --native-only

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks

      - name: Build Release (Signed)
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEKIT_KEYSTORE_FILE: ${{ runner.temp }}/wekit-keystore.jks
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Build Release (Unsigned)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Collect APKs
        run: |
          # Flavors nest output under apk/<flavor>/release/; flatten into one dir
          # so downstream jobs (release / telegram) keep a flat artifact layout.
          mkdir -p dist/apk
          find app/build/outputs/apk -type f -name '*.apk' -exec cp -v {} dist/apk/ \;
          echo "Collected APKs:"
          ls -1 dist/apk

      - name: Collect mappings
        run: |
          # One mapping.txt per flavor; rename per flavor to avoid collisions.
          mkdir -p dist/mapping
          for m in app/build/outputs/mapping/*/mapping.txt; do
            flavorDir=$(basename "$(dirname "$m")")   # e.g. standardRelease
            cp -v "$m" "dist/mapping/mapping-${flavorDir}.txt"
          done
          ls -1 dist/mapping || echo "(no mappings — unsigned PR build without minify?)"

      - name: Upload Release APKs
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: dist/apk/*.apk

      - name: Upload Release Obfuscation Mapping
        uses: actions/upload-artifact@v7
        with:
          name: wekit-mapping
          path: dist/mapping/*.txt

  release-ci:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Delete existing CI release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete CI --yes || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/CI || true

      - name: Generate update.json
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          GIT_HASH=$(git rev-parse --short HEAD)

          cat > artifacts/update.json <<EOF
          {
            "versionCode": ${COMMIT_COUNT},
            "versionName": "git+${GIT_HASH}",
            "commit": "${GIT_HASH}"
          }
          EOF

          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Create CI release and upload APK
        uses: softprops/action-gh-release@v3
        with:
          tag_name: CI
          name: CI
          body: |
            本 Release 始终包含最新的 CI 构建产物, 便于未登录 GitHub 的用户下载模块或模块内置更新器更新
            
            提交 SHA: `${{ github.sha }}`

            提交消息:
            ```
            ${{ github.event.head_commit.message || '手动构建' }}
            ```
          files: |
            artifacts/*.apk
            artifacts/update.json
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-telegram:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    services:
      telegram-bot-api:
        image: aiogram/telegram-bot-api:latest
        env:
          TELEGRAM_API_ID: "21724"
          TELEGRAM_API_HASH: "3e0cb5efcd52300aec5994fdfc5bdc16"
          TELEGRAM_STATISTICS: 1
        ports:
          - 8081:8081

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Wait for Telegram API
        run: |
          until curl -s http://localhost:8081 > /dev/null; do
          echo "Waiting for Telegram API server..."
          sleep 1
          done

      - name: Send APKs via Telegram API
        env:
          BOT_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          SHA:               ${{ github.sha }}
          COMMIT_AUTHOR:     ${{ github.event.head_commit.author.name || github.actor }}
          REPO:              ${{ github.repository }}
        run: |
          caption="🎉 *检测到新的 GitHub 推送！*
          *Commit SHA:* \`${SHA}\`
          \`\`\`
          ${{ github.event.head_commit.message || 'Manual Build' }}
          \`\`\`
          *提交者* \`${COMMIT_AUTHOR}\`
          [查看详情](https://github.com/${REPO}/commit/${SHA})"
          
          apks=(artifacts/*.apk)
          
          echo $apks
          
          if [ ${#apks[@]} -eq 1 ]; then
            # Single APK — use sendDocument (supports caption)
            curl -s -X POST "http://localhost:8081/bot${BOT_TOKEN}/sendDocument" \
              -F chat_id="${CHAT_ID}" \
              -F document=@"${apks[0]}" \
              -F caption="${caption}" \
              -F parse_mode=Markdown
          else
            media_json="["
            form_args=()
            for i in "${!apks[@]}"; do
              apk="${apks[$i]}"
              name="apk${i}"
              form_args+=(-F "${name}=@${apk}")
          
              if [ $i -gt 0 ]; then media_json+=","; fi
          
              if [ $i -eq $(( ${#apks[@]} - 1 )) ]; then
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\",\"caption\":\"${caption}\",\"parse_mode\":\"Markdown\"}"
              else
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\"}"
              fi
            done
            media_json+="]"
          
            echo $media_json
          
            curl -s -X POST "http://localhost:8081/bot${BOT_TOKEN}/sendMediaGroup" \
              -F chat_id="${CHAT_ID}" \
              -F message_thread_id="${MESSAGE_THREAD_ID}" \
              -F media="${media_json}" \
              "${form_args[@]}"
          fi
